<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Connexion — CBRS Admin</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  body { font-family: 'Inter', sans-serif; }
</style>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          'cbrs-blue': '#0a3273', 'cbrs-blue-light': '#1e4b99',
          'cbrs-green': '#58a01a', 'cbrs-green-hover': '#4a8716',
          'cbrs-teal': '#145c75',
        }
      }
    }
  }
</script>
</head>
<body class="min-h-screen bg-gradient-to-br from-cbrs-blue via-blue-900 to-cbrs-teal flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="bg-white/95 backdrop-blur rounded-2xl shadow-2xl p-8">
      <div class="text-center mb-6">
        <img src="logo-cbrs.png" alt="CBRS" class="w-20 h-20 mx-auto mb-3"/>
        <h1 class="text-lg font-bold text-gray-900">Espace administration</h1>
        <p class="text-xs text-gray-500 mt-0.5">Connectez-vous pour gérer le site</p>
      </div>

      <form id="login-form" class="space-y-4">
        <div>
          <label for="login-username" class="sr-only">Identifiant</label>
          <input type="text" id="login-username" autocomplete="username" required
                 class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-cbrs-green focus:border-cbrs-green outline-none text-sm"
                 placeholder="Identifiant"/>
        </div>
        <div>
          <label for="login-password" class="sr-only">Mot de passe</label>
          <input type="password" id="login-password" autocomplete="current-password" required
                 class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-cbrs-green focus:border-cbrs-green outline-none text-sm"
                 placeholder="Mot de passe"/>
        </div>
        <div id="login-error" class="hidden bg-red-50 border border-red-200 text-red-700 text-xs rounded-xl px-3 py-2"></div>
        <button type="submit"
                class="w-full bg-cbrs-green hover:bg-cbrs-green-hover text-white font-semibold py-2.5 rounded-xl transition-colors text-sm">
          Se connecter
        </button>
      </form>

      <p class="text-[10px] text-gray-400 text-center mt-5 leading-relaxed">
        <span class="block text-gray-500 font-medium mb-1">Identifiants de démonstration</span>
        <code class="bg-gray-100 px-1.5 py-0.5 rounded">admin</code> / <code class="bg-gray-100 px-1.5 py-0.5 rounded">cbrs2026</code>
        <span class="block mt-1">
          <code class="bg-gray-100 px-1.5 py-0.5 rounded">formateur</code> / <code class="bg-gray-100 px-1.5 py-0.5 rounded">cbrs2026</code>
        </span>
      </p>
    </div>

    <div class="text-center mt-4">
      <a href="index.html" class="text-white/70 hover:text-white text-xs transition-colors">&larr; Retour au site</a>
    </div>
  </div>

<script src="auth.js"></script>
<script>
const USERS = {
  admin: { password: 'cbrs2026', role: 'admin', name: 'Administrateur' },
  formateur: { password: 'cbrs2026', role: 'formateur', name: 'Animateur' }
};

const form = document.getElementById('login-form');
const errorBox = document.getElementById('login-error');

if (CBRS_AUTH.isLoggedIn()) {
  window.location.href = 'admin.html';
}

form.addEventListener('submit', function(e) {
  e.preventDefault();
  const username = document.getElementById('login-username').value.trim().toLowerCase();
  const password = document.getElementById('login-password').value;

  const user = USERS[username];
  if (!user || user.password !== password) {
    errorBox.textContent = 'Identifiant ou mot de passe incorrect.';
    errorBox.classList.remove('hidden');
    return;
  }

  const auth = {
    username: user.role,
    name: user.name,
    role: user.role,
    loginAt: new Date().toISOString()
  };
  localStorage.setItem('cbrs-auth', JSON.stringify(auth));
  window.location.href = 'admin.html';
});
</script>
</body></html>
