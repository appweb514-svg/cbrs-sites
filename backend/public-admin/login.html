<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Connexion admin CBRS</title><link rel="stylesheet" href="admin.css"></head><body><div class="wrap"><div class="card" style="max-width:420px;margin:8vh auto"><h1>Connexion CBRS</h1><p class="muted">Administration du site</p><form id="f"><label>Email</label><input id="email" type="email" value="admin@cbrs.local" required><label>Mot de passe</label><input id="password" type="password" required><button class="green">Se connecter</button><p id="err" class="danger"></p></form></div></div><script src="admin.js"></script><script>f.onsubmit=async e=>{e.preventDefault();err.textContent='';try{await api('/api/auth/login',{method:'POST',body:JSON.stringify({email:email.value,password:password.value})});location.href='/admin/dashboard.html'}catch(x){err.textContent=x.message}}</script></body></html>
