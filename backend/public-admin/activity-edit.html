<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Modifier activité CBRS</title><link rel="stylesheet" href="admin.css"></head><body><div data-nav></div><main class="wrap"><h1 id="title">Activité</h1><p class="muted" data-user></p><form class="card" id="form"><label>Nom</label><input id="name"><label>Catégorie</label><input id="category"><label>Description courte</label><textarea id="short_description"></textarea><label>Présentation</label><textarea id="presentation"></textarea><label>Point de rendez-vous</label><textarea id="meeting_point"></textarea><label>Niveau</label><input id="level"><label>Infos pratiques (une par ligne)</label><textarea id="practical_info"></textarea><label>Référents (Nom | téléphone, une ligne par référent)</label><textarea id="animators"></textarea><label>Horaires (Jour | heure | lieu, une ligne par horaire)</label><textarea id="schedule"></textarea><button class="green">Enregistrer</button> <a class="btn" href="activities.html">Retour</a><p id="msg" class="muted"></p></form></main><script src="admin.js"></script><script>
const id=new URL(location.href).searchParams.get('id');let activity;
me().then(load);
function lines(v){return String(v||'').split('\n').map(x=>x.trim()).filter(Boolean)}
async function load(){activity=(await api('/api/admin/activities/'+id)).activity;title.textContent='Modifier '+activity.name;for(const k of ['name','category','short_description','presentation','meeting_point','level'])document.getElementById(k).value=activity[k]||'';practical_info.value=(activity.practical_info||[]).join('\n');animators.value=(activity.animators||[]).map(a=>[a.name,a.phone].filter(Boolean).join(' | ')).join('\n');schedule.value=(activity.schedule||[]).map(s=>[s.day,s.time,s.location].join(' | ')).join('\n')}
form.onsubmit=async e=>{e.preventDefault();const body={};for(const k of ['name','category','short_description','presentation','meeting_point','level'])body[k]=document.getElementById(k).value;body.practical_info=lines(practical_info.value);body.animators=lines(animators.value).map(l=>{const [name,phone='']=l.split('|').map(x=>x.trim());return{name,phone}});body.schedule=lines(schedule.value).map(l=>{const [day='',time='',location='']=l.split('|').map(x=>x.trim());return{day,time,location}});body.published=1;await api('/api/admin/activities/'+id,{method:'PUT',body:JSON.stringify(body)});msg.textContent='Enregistré.'}
</script></body></html>
