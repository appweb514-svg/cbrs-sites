<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Flash info CBRS</title><link rel="stylesheet" href="admin.css"></head><body><div data-nav></div><main class="wrap"><h1>Flash info</h1><form class="card" id="form"><label><input id="enabled" type="checkbox"> Afficher le flash info</label><label>Titre</label><input id="title"><label>Message</label><textarea id="message"></textarea><label>Libellé du bouton</label><input id="cta_label"><label>Lien du bouton</label><input id="cta_url"><button class="green">Enregistrer</button><p id="msg" class="muted"></p></form></main><script src="admin.js"></script><script>me().then(load);async function load(){const {flash}=await api('/api/admin/flash-info');enabled.checked=!!flash.enabled;title.value=flash.title||'';message.value=flash.message||'';cta_label.value=flash.cta_label||'';cta_url.value=flash.cta_url||''}form.onsubmit=async e=>{e.preventDefault();await api('/api/admin/flash-info',{method:'PUT',body:JSON.stringify({enabled:enabled.checked,title:title.value,message:message.value,cta_label:cta_label.value,cta_url:cta_url.value})});msg.textContent='Enregistré.'}</script></body></html>
