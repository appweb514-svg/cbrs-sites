<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Apparence CBRS</title><link rel="stylesheet" href="admin.css"></head><body><div data-nav></div><main class="wrap"><h1>Apparence du site</h1><form class="card" id="form"><label>Nom du site</label><input id="site_name"><label>Couleur principale</label><input id="primary_color" type="color"><label>Couleur secondaire</label><input id="secondary_color" type="color"><label>Couleur accent</label><input id="accent_color" type="color"><label>Chemin du logo</label><input id="logo_path"><label>Titre accueil</label><input id="hero_title"><label>Sous-titre accueil</label><textarea id="hero_subtitle"></textarea><button class="green">Enregistrer</button><p id="msg" class="muted"></p></form></main><script src="admin.js"></script><script>const keys=['site_name','primary_color','secondary_color','accent_color','logo_path','hero_title','hero_subtitle'];me().then(load);async function load(){const {settings}=await api('/api/admin/settings');keys.forEach(k=>document.getElementById(k).value=settings[k]||'')}form.onsubmit=async e=>{e.preventDefault();const body={};keys.forEach(k=>body[k]=document.getElementById(k).value);await api('/api/admin/settings',{method:'PUT',body:JSON.stringify(body)});msg.textContent='Enregistré.'}</script></body></html>
